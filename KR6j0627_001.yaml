body:
  text: 大唐三藏法師玄奘奉詔譯如是我聞一時薄伽梵在室羅筏住誓多林給孤獨園與無央數聲聞菩薩摩訶薩俱及諸天人阿素洛等無量大衆前後圍繞爾時衆中有一菩薩名不可説功德莊嚴從座而起頂禮佛足合掌恭敬白佛言世尊今此世界無量有情煩惱因緣造諸惡業當墮地獄餓鬼傍生或天人中受諸劇苦唯願哀愍方便拔濟佛言善男子善哉善哉汝能哀愍一切有情作如是請諦聽諦聽吾今為汝略説拔濟衆苦方便善男子有佛世尊名為不動如來應正等覺為欲利樂諸有情故説陀羅尼令衆誦念陀羅尼曰羯羯尼羯羯尼魯折尼魯折尼咄盧磔尼咄盧磔尼怛邏薩尼怛羅薩尼般剌底喝那般剌底喝那薩縛羯莫般藍般邏般謎莎訶若有善男子善女人至誠敬禮不動如來應正等覺受持此呪先所造作五無間業四重十惡毀諸聖賢謗正法罪皆悉除滅臨命終時彼不動佛與諸菩薩來現其前讚歎慰喻令其歡喜復告之言今來迎汝應隨我往所從佛國彼命終已決定往生不動如來清淨佛土善男子復有世尊名滅惡趣王如來應正等覺為欲利樂諸有情故説陀羅尼令衆誦念陀羅尼曰輸達泥輸達泥薩縛播波毗輸達泥戍睇毗戍睇薩縛羯莫毗戍睇莎訶若有善男子善女人至誠禮敬滅惡趣王如來應正等覺受持此呪萬四千劫常憶宿命所在生處得丈夫身具足諸根深信因果善諸技術妙解諸論好行惠施厭捨諸欲不造惡業離諸危怖具正命慧衆所愛重常近善友恆聞正法求菩提心曾無暫捨以諸功德而自莊嚴具善律儀怖諸惡業恆無匱乏調柔樂靜於天人中常受快樂速證無上正等菩提終不退於十到彼岸常願利樂一切有情諸所修行非專自利在所生處常得見佛護持正法預賢聖衆時薄伽梵説此經已聲聞菩薩及諸天人阿素洛等聞佛所説皆大歡喜信受奉行
